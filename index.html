<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snip</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    width: 100%; height: 100%; overflow: hidden; 
    background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #feed { 
    width: 100%; height: 100%; overflow-y: scroll; 
    scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch;
  }
  .video-container {
    width: 100%; height: 100%; position: relative;
    scroll-snap-align: start; background: #000;
  }
  video { width: 100%; height: 100%; object-fit: cover; }
  .overlay {
    position: absolute; bottom: 80px; left: 12px; right: 80px;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .username { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  .caption { font-size: 14px; }
  .actions {
    position: absolute; bottom: 80px; right: 12px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .action-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; cursor: pointer; user-select: none;
  }
  .action-btn:active { transform: scale(0.9); }
  .liked { background: rgba(255,59,92,0.6); }
  #commentsModal {
    position: fixed; bottom: 0; left: 0; right: 0; height: 70%;
    background: #111; border-radius: 16px 16px 0 0; z-index: 100;
    transform: translateY(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column;
  }
  #commentsModal.open { transform: translateY(0); }
  .modal-header {
    padding: 16px; text-align: center; font-weight: 600; color: #fff;
    border-bottom: 1px solid #333; position: relative;
  }
  .close-btn {
    position: absolute; right: 16px; top: 16px; font-size: 24px;
    cursor: pointer; color: #aaa;
  }
  #commentsList { flex: 1; overflow-y: auto; padding: 16px; color: #fff; }
  .comment-input-wrap {
    padding: 12px; border-top: 1px solid #333; display: flex; gap: 8px;
  }
  #commentInput {
    flex: 1; padding: 10px 14px; border-radius: 20px; border: none;
    background: #222; color: #fff; font-size: 14px; outline: none;
  }
  #postCommentBtn {
    padding: 10px 16px; border-radius: 20px; border: none;
    background: #ff3b5c; color: #fff; font-weight: 600; cursor: pointer;
  }
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 99; display: none;
  }
  #overlay.show { display: block; }
</style>
</head>
<body>
<div id="feed"></div>
<div id="overlay"></div>
<div id="commentsModal">
  <div class="modal-header">
    Comments
    <div class="close-btn" onclick="closeComments()">×</div>
  </div>
  <div id="commentsList"></div>
  <div class="comment-input-wrap">
    <input id="commentInput" placeholder="Add a comment..." />
    <button id="postCommentBtn" onclick="postComment()">Post</button>
  </div>
</div>
<script>
  const { Client, Databases, ID, Query } = Appwrite;
  const client = new Client()
    .setEndpoint('https://fra.cloud.appwrite.io/v1')
    .setProject('snip-3778');
  const databases = new Databases(client);
  const DATABASE_ID = 'snip_db';
  const COLLECTION_ID = 'videos';
  const COMMENTS_ID = 'comments';
  let currentVideoId = null;
  let videos = [];
  async function loadFeed() {
    try {
      const res = await databases.listDocuments(DATABASE_ID, COLLECTION_ID, [Query.limit(20), Query.orderDesc('$createdAt')]);
      videos = res.documents;
      renderFeed();
    } catch(e) { alert('Error loading feed: ' + e.message); }
  }
  function renderFeed() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    videos.forEach((doc, i) => {
      const div = document.createElement('div');
      div.className = 'video-container';
      div.innerHTML = `<video src="${doc.videoUrl}" loop muted playsinline preload="metadata"></video><div class="overlay"><div class="username">@${doc.username || 'user'}</div><div class="caption">${doc.caption || ''}</div></div><div class="actions"><div class="action-btn" onclick="likeVideo('${doc.$id}', this)">❤️</div><div class="action-btn" onclick="openComments('${doc.$id}')">💬</div></div>`;
      feed.appendChild(div);
      if (i === 0) { const vid = div.querySelector('video'); vid.play().catch(()=>{}); }
    });
    feed.addEventListener('scroll', () => {
      document.querySelectorAll('video').forEach(v => {
        const rect = v.getBoundingClientRect();
        if (rect.top >= 0 && rect.bottom <= window.innerHeight + 100) { v.play().catch(()=>{}); } 
        else { v.pause(); }
      });
    });
  }
  function likeVideo(id, btn) { btn.classList.toggle('liked'); }
  function openComments(videoId) {
    currentVideoId = videoId;
    document.getElementById('commentsModal').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    loadComments(videoId);
  }
  function closeComments() {
    document.getElementById('commentsModal').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('commentInput').value = '';
  }
  async function loadComments(videoId) {
    try {
      const res = await databases.listDocuments(DATABASE_ID, COMMENTS_ID, [Query.equal('videoId', videoId), Query.orderDesc('createdAt'), Query.limit(50)]);
      const list = document.getElementById('commentsList');
      list.innerHTML = '';
      if (res.documents.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#aaa;margin-top:20px">No comments yet. Be the first!</p>';
        return;
      }
      res.documents.forEach(doc => {
        const div = document.createElement('div');
        div.style = 'margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #222';
        div.innerHTML = `<div style="font-weight:600;font-size:14px;color:#fff">@${doc.user || 'user'}</div><div style="font-size:14px;margin-top:4px;color:#ddd">${doc.text}</div>`;
        list.appendChild(div);
      });
    } catch(e) { 
      console.error(e);
      alert('Error loading comments: ' + e.message); 
    }
  }
  async function postComment() {
    const input = document.getElementById('commentInput');
    const text = input.value.trim();
    if (!text || !currentVideoId) return;
    try {
      await databases.createDocument(DATABASE_ID, COMMENTS_ID, ID.unique(), { videoId: currentVideoId, text: text, user: 'user', createdAt: new Date().toISOString() });
      input.value = '';
      loadComments(currentVideoId);
    } catch(e) { alert('Error posting comment: ' + e.message); }
  }
  document.getElementById('overlay').onclick = closeComments;
  loadFeed();
</script>
</body>
</html>
