<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snip</title>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:-apple-system, sans-serif; }
    #video-container { height:100vh; width:100vw; overflow-y:scroll; scroll-snap-type:y mandatory; }
  .video-slide { height:100vh; width:100vw; position:relative; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; }
    video { height:100vh; width:100vw; object-fit:cover; }
  .upload-btn { position:fixed; bottom:30px; right:20px; width:60px; height:60px; background:#fe2c55; border-radius:50%; border:none; color:white; font-size:30px; z-index:100; cursor:pointer; }
  .upload-btn:active { transform:scale(0.9); }
    #fileInput { display:none; }
  .info { position:absolute; bottom:100px; left:15px; color:white; z-index:10; }
  .title { font-weight:600; font-size:16px; text-shadow:0 0 4px rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <div id="video-container"></div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+</button>
  <input type="file" id="fileInput" accept="video/*" onchange="uploadVideo(this.files[0])">

<script>
const { Client, Databases, Storage, ID } = Appwrite;
const client = new Client();
client.setEndpoint('https://cloud.appwrite.io/v1').setProject('68c9d8b0001c69a9c0b5');

const databases = new Databases(client);
const storage = new Storage(client);

const DATABASE_ID = '68c9d9a4000fe265c4e2';
const COLLECTION_ID = 'videos';
const BUCKET_ID = 'videos';

async function loadVideos() {
  try {
    const response = await databases.listDocuments(DATABASE_ID, COLLECTION_ID);
    const container = document.getElementById('video-container');
    container.innerHTML = '';
    
    response.documents.reverse().forEach(doc => {
      const videoUrl = storage.getFileView(BUCKET_ID, doc.fileId);
      const slide = document.createElement('div');
      slide.className = 'video-slide';
      slide.innerHTML = `
        <video src="${videoUrl}" loop playsinline></video>
        <div class="info">
          <div class="title">${doc.title || 'Untitled'}</div>
        </div>
      `;
      container.appendChild(slide);
      
      const vid = slide.querySelector('video');
      vid.addEventListener('click', () => vid.paused? vid.play() : vid.pause());
    });
    
    const firstVideo = document.querySelector('video');
    if (firstVideo) {
      firstVideo.muted = true;
      firstVideo.play().catch(e => {});
    }
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        if (entry.isIntersecting) {
          document.querySelectorAll('video').forEach(v => v.pause());
          vid.muted = false;
          vid.play().catch(e => {});
        } else {
          vid.pause();
        }
      });
    }, { threshold: 0.7 });
    
    document.querySelectorAll('.video-slide').forEach(slide => observer.observe(slide));
    
  } catch (e) {
    console.log('No videos yet');
  }
}

async function uploadVideo(file) {
  if (!file) return;
  const btn = document.querySelector('.upload-btn');
  btn.innerHTML = '⏳';
  btn.disabled = true;
  
  try {
    const uploaded = await storage.createFile(BUCKET_ID, ID.unique(), file);
    await databases.createDocument(DATABASE_ID, COLLECTION_ID, ID.unique(), {
      title: file.name.replace(/\.[^/.]+$/, ""),
      fileId: uploaded.$id,
      createdAt: new Date().toISOString()
    });
    btn.innerHTML = '+';
    btn.disabled = false;
    loadVideos();
  } catch (e) {
    alert('Upload failed: ' + e.message);
    btn.innerHTML = '+';
    btn.disabled = false;
  }
}

loadVideos();
</script>
</body>
</html>
