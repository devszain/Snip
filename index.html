<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; }
    .header { background: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10; }
    .logo { width: 32px; height: 32px; }
    .search { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 20px; outline: none; }
    .admin-badge { background: #ef4444; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .btn { padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #3b82f6; color: white; border: none; }
    .btn-danger { background: #ef4444; color: white; border: none; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .new-snip-btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 600; margin-bottom: 16px; cursor: pointer; }
    .categories { display: flex; gap: 8px; margin-bottom: 16px; }
    .cat { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 20px; background: white; cursor: pointer; font-size: 14px; }
    .cat.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .snip { background: white; border-radius: 12px; margin-bottom: 16px; overflow: hidden; border: 1px solid #e5e7eb; }
    .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; }
    .snip-body { padding: 12px; }
    .snip-title { font-weight: 600; margin-bottom: 4px; }
    .snip-meta { display: flex; justify-content: space-between; align-items: center; color: #6b7280; font-size: 14px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: white; border-radius: 12px; padding: 20px; width: 90%; max-width: 400px; }
    .input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; margin-bottom: 12px; }
    .footer { text-align: center; padding: 20px; color: #9ca3af; font-size: 12px; }
    .admin-link { color: #9ca3af; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" class="logo" alt="SNIP">
    <input type="text" class="search" placeholder="Search Snips" id="search">
    <span id="adminBadge" style="display:none" class="admin-badge">ADMIN</span>
    <span id="username"></span>
    <button id="authBtn" class="btn">Log In</button>
  </div>

  <div class="container">
    <button id="newSnipBtn" class="new-snip-btn" style="display:none">+ New Snip</button>
    
    <div class="categories" id="cats">
      <div class="cat active" data-cat="All">All</div>
      <div class="cat" data-cat="Intro">Intro</div>
      <div class="cat" data-cat="Tech">Tech</div>
    </div>

    <div id="feed"></div>
  </div>

  <div class="footer">
    <span class="admin-link" id="adminLink">Admin</span>
  </div>

  <!-- Login Modal -->
  <div class="modal" id="authModal">
    <div class="modal-box">
      <h3 id="authTitle">Log In</h3>
      <input type="text" class="input" id="authUser" placeholder="Username">
      <input type="password" class="input" id="authPass" placeholder="Password">
      <button class="btn btn-primary" style="width:100%;margin-bottom:8px" id="authSubmit">Log In</button>
      <button class="btn" style="width:100%" id="authToggle">Need an account? Sign Up</button>
    </div>
  </div>

  <!-- New Snip Modal -->
  <div class="modal" id="snipModal">
    <div class="modal-box">
      <h3>New Snip</h3>
      <input type="text" class="input" id="snipTitle" placeholder="Title">
      <input type="text" class="input" id="snipCat" placeholder="Category - Intro, Tech, etc">
      <input type="text" class="input" id="snipLink" placeholder="YouTube/TikTok Link">
      <input type="text" class="input" id="snipThumb" placeholder="Thumbnail URL - optional">
      <button class="btn btn-primary" style="width:100%" id="postSnip">Post Snip</button>
    </div>
  </div>

<script>
const OWNER_USERNAME = 'devszain';
let user = JSON.parse(localStorage.getItem('snip_user') || 'null');
let snips = JSON.parse(localStorage.getItem('snip_posts') || '[]');
let users = JSON.parse(localStorage.getItem('snip_users') || '{}');

if (snips.length === 0) {
  snips = [
    {id: 1, title: 'Welcome to Snip - First Upload', cat: 'Intro', link: 'https://youtube.com/watch?v=dQw4w9WgXcQ', thumb: 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg', author: 'Wumpgod', time: Date.now()},
    {id: 2, title: 'Building iOS Apps in 2026', cat: 'Tech', link: 'https://youtube.com', thumb: 'https://i.ytimg.com/vi/jNQXAC9IVRw/hqdefault.jpg', author: 'devszain', time: Date.now()}
  ];
  localStorage.setItem('snip_posts', JSON.stringify(snips));
}

function save() {
  localStorage.setItem('snip_posts', JSON.stringify(snips));
  localStorage.setItem('snip_users', JSON.stringify(users));
  if (user) localStorage.setItem('snip_user', JSON.stringify(user));
  else localStorage.removeItem('snip_user');
}

function isAdmin() {
  return user && user.username === OWNER_USERNAME;
}

function render() {
  const feed = document.getElementById('feed');
  const search = document.getElementById('search').value.toLowerCase();
  const activeCat = document.querySelector('.cat.active').dataset.cat;
  
  let filtered = snips.filter(s => {
    const matchSearch = s.title.toLowerCase().includes(search);
    const matchCat = activeCat === 'All' || s.cat === activeCat;
    return matchSearch && matchCat;
  });

  feed.innerHTML = filtered.map(s => `
    <div class="snip">
      <img src="${s.thumb}" class="thumb" onerror="this.src='https://via.placeholder.com/640x360/000/fff?text=No+Thumbnail'">
      <div class="snip-body">
        <div class="snip-title">${s.title}</div>
        <div class="snip-meta">
          <span>${s.author}</span>
          ${isAdmin() ? `<button class="btn btn-danger" onclick="delSnip(${s.id})">Delete</button>` : '<span>Report</span>'}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('username').textContent = user ? user.username : '';
  document.getElementById('adminBadge').style.display = isAdmin() ? 'inline' : 'none';
  document.getElementById('newSnipBtn').style.display = isAdmin() ? 'block' : 'none';
  document.getElementById('authBtn').textContent = user ? 'Log Out' : 'Log In';
}

function delSnip(id) {
  if (!isAdmin()) return;
  snips = snips.filter(s => s.id !== id);
  save(); render();
}

document.getElementById('authBtn').onclick = () => {
  if (user) {
    user = null; save(); render();
  } else {
    document.getElementById('authModal').classList.add('show');
  }
};

document.getElementById('adminLink').onclick = () => {
  document.getElementById('authModal').classList.add('show');
};

let isSignup = false;
document.getElementById('authToggle').onclick = () => {
  isSignup = !isSignup;
  document.getElementById('authTitle').textContent = isSignup ? 'Sign Up' : 'Log In';
  document.getElementById('authSubmit').textContent = isSignup ? 'Create Account' : 'Log In';
  document.getElementById('authToggle').textContent = isSignup ? 'Have an account? Log In' : 'Need an account? Sign Up';
};

document.getElementById('authSubmit').onclick = () => {
  const u = document.getElementById('authUser').value.trim();
  const p = document.getElementById('authPass').value;
  if (!u || !p) return alert('Fill all fields');
  
  if (isSignup) {
    if (users[u]) return alert('Username taken');
    users[u] = { password: p };
    user = { username: u };
  } else {
    if (!users[u] || users[u].password !== p) return alert('Wrong login');
    user = { username: u };
  }
  save(); render();
  document.getElementById('authModal').classList.remove('show');
};

document.getElementById('newSnipBtn').onclick = () => {
  document.getElementById('snipModal').classList.add('show');
};

document.getElementById('postSnip').onclick = () => {
  const title = document.getElementById('snipTitle').value.trim();
  const cat = document.getElementById('snipCat').value.trim() || 'Intro';
  const link = document.getElementById('snipLink').value.trim();
  let thumb = document.getElementById('snipThumb').value.trim();
  
  if (!title || !link) return alert('Need title and link');
  
  if (!thumb && link.includes('youtube.com/watch?v=')) {
    const id = link.split('v=')[1].split('&')[0];
    thumb = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
  }
  if (!thumb) thumb = 'https://via.placeholder.com/640x360/000/fff?text=SNIP';
  
  snips.unshift({
    id: Date.now(),
    title, cat, link, thumb,
    author: user.username,
    time: Date.now()
  });
  
  save(); render();
  document.getElementById('snipModal').classList.remove('show');
  document.getElementById('snipTitle').value = '';
  document.getElementById('snipCat').value = '';
  document.getElementById('snipLink').value = '';
  document.getElementById('snipThumb').value = '';
};

document.querySelectorAll('.cat').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.cat').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    render();
  };
});

document.getElementById('search').oninput = render;

document.querySelectorAll('.modal').forEach(m => {
  m.onclick = (e) => { if (e.target === m) m.classList.remove('show'); };
});

render();
</script>
</body>
</html>
