<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snip</title>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:-apple-system, sans-serif; color:white; }
    #video-container { height:100vh; width:100vw; overflow-y:scroll; scroll-snap-type:y mandatory; }
  .video-slide { height:100vh; width:100vw; position:relative; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; }
    video { height:100vh; width:100vw; object-fit:cover; }
  .upload-btn { position:fixed; bottom:30px; right:20px; width:60px; height:60px; background:#fe2c55; border-radius:50%; border:none; color:white; font-size:28px; z-index:100; cursor:pointer; }
  .profile-btn { position:fixed; top:20px; right:20px; width:40px; height:40px; background:rgba(255,255,255,0.2); border-radius:50%; border:none; color:white; font-size:18px; z-index:100; cursor:pointer; backdrop-filter:blur(10px); }
    #fileInput { display:none; }
  .info { position:absolute; bottom:100px; left:15px; z-index:10; max-width:70%; }
  .title { font-weight:600; font-size:16px; text-shadow:0 0 4px rgba(0,0,0,0.8); margin-bottom:5px; }
  .channel { font-size:14px; opacity:0.9; text-shadow:0 0 4px rgba(0,0,0,0.8); }
  .actions { position:absolute; right:15px; bottom:150px; display:flex; flex-direction:column; gap:20px; z-index:10; align-items:center; }
  .action-btn { background:rgba(255,255,255,0.15); border:none; width:50px; height:50px; border-radius:50%; color:white; font-size:24px; cursor:pointer; backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; }
  .action-btn.active { background:#fe2c55; }
  .action-count { font-size:12px; margin-top:4px; text-align:center; text-shadow:0 0 4px rgba(0,0,0,0.8); }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
  .modal.show { display:flex; }
  .modal-content { background:#1a1a1a; padding:25px; border-radius:16px; width:100%; max-width:350px; }
  .modal h2 { margin-bottom:20px; font-size:20px; }
  .modal input { width:100%; padding:12px; margin-bottom:12px; background:#000; border:1px solid #333; border-radius:8px; color:white; font-size:16px; }
  .modal button { width:100%; padding:12px; background:#fe2c55; border:none; border-radius:8px; color:white; font-size:16px; cursor:pointer; margin-top:5px; }
  .modal.secondary { background:#333; }
  .comments-sheet { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; border-radius:20px 20px 0 0; z-index:150; max-height:70vh; display:none; flex-direction:column; }
  .comments-sheet.show { display:flex; }
  .sheet-handle { width:40px; height:4px; background:#555; border-radius:2px; margin:12px auto; cursor:pointer; }
  .comments-header { padding:0 20px 10px; font-weight:600; border-bottom:1px solid #333; }
  .comments-list { flex:1; overflow-y:auto; padding:0 20px; }
  .comment { padding:12px 0; border-bottom:1px solid #333; }
  .comment-user { font-weight:600; font-size:14px; margin-bottom:4px; }
  .comment-text { font-size:14px; opacity:0.9; }
  .comment-input-wrap { padding:15px 20px; border-top:1px solid #333; display:flex; gap:10px; }
  .comment-input-wrap input { flex:1; padding:12px; background:#000; border:1px solid #333; border-radius:20px; color:white; }
  .comment-input-wrap button { padding:12px 20px; background:#fe2c55; border:none; border-radius:20px; color:white; cursor:pointer; }
  </style>
</head>
<body>
  <div id="video-container"></div>
  <button class="profile-btn" onclick="openAuth()">👤</button>
  <button class="upload-btn" onclick="checkAuthUpload()">+</button>
  <input type="file" id="fileInput" accept="video/*" onchange="uploadVideo(this.files[0])">

  <div class="modal" id="authModal">
    <div class="modal-content">
      <h2 id="authTitle">Sign In</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="signIn()">Sign In</button>
      <button class="secondary" onclick="signUp()">Create Account</button>
      <button class="secondary" onclick="closeAuth()">Cancel</button>
    </div>
  </div>

  <div class="comments-sheet" id="commentsSheet">
    <div class="sheet-handle" onclick="closeComments()"></div>
    <div class="comments-header" id="commentsHeader">Comments</div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comment-input-wrap">
      <input type="text" id="commentInput" placeholder="Add a comment...">
      <button onclick="postComment()">Post</button>
    </div>
  </div>

<script>
const { Client, Databases, Storage, Account, ID, Query } = Appwrite;
const client = new Client();
client.setEndpoint('https://fra.cloud.appwrite.io/v1').setProject('snip-3778');

const databases = new Databases(client);
const storage = new Storage(client);
const account = new Account(client);

const DATABASE_ID = 'snip_db';
const COLLECTION_ID = 'videos';
const COMMENTS_ID = 'comments';
const BUCKET_ID = 'videos';

let currentUser = null;
let currentVideoId = null;

async function init() {
  try { currentUser = await account.get(); } catch(e) {}
  loadVideos();
}
init();

async function loadVideos() {
  try {
    const response = await databases.listDocuments(DATABASE_ID, COLLECTION_ID, [Query.orderDesc('$createdAt')]);
    const container = document.getElementById('video-container');
    container.innerHTML = '';

    for (const doc of response.documents) {
      const liked = localStorage.getItem(`liked_${doc.$id}`);
      const disliked = localStorage.getItem(`disliked_${doc.$id}`);

      const slide = document.createElement('div');
      slide.className = 'video-slide';
      slide.dataset.videoId = doc.$id;
      slide.innerHTML = `
        <video src="${doc.url}" loop playsinline></video>
        <div class="info">
          <div class="title">${doc.title || 'Untitled'}</div>
          <div class="channel">@${doc.channel || 'user'}</div>
        </div>
        <div class="actions">
          <div>
            <button class="action-btn ${liked? 'active' : ''}" onclick="likeVideo('${doc.$id}')">❤️</button>
            <div class="action-count">${doc.likes || 0}</div>
          </div>
          <div>
            <button class="action-btn ${disliked? 'active' : ''}" onclick="dislikeVideo('${doc.$id}')">👎</button>
            <div class="action-count">${doc.dislikes || 0}</div>
          </div>
          <div>
            <button class="action-btn" onclick="openComments('${doc.$id}')">💬</button>
            <div class="action-count" id="comment-count-${doc.$id}">...</div>
          </div>
        </div>
      `;
      container.appendChild(slide);

      // Load comment count
      loadCommentCount(doc.$id);

      const vid = slide.querySelector('video');
      vid.addEventListener('click', () => vid.paused? vid.play() : vid.pause());
    }

    const firstVideo = document.querySelector('video');
    if (firstVideo) { firstVideo.muted = true; firstVideo.play().catch(()=>{}); }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        if (entry.isIntersecting) {
          document.querySelectorAll('video').forEach(v => v.pause());
          vid.muted = false;
          vid.play().catch(()=>{});
        } else { vid.pause(); }
      });
    }, { threshold: 0.7 });
    document.querySelectorAll('.video-slide').forEach(slide => observer.observe(slide));
  } catch(e) { console.log(e.message); }
}

async function loadCommentCount(videoId) {
  try {
    const res = await databases.listDocuments(DATABASE_ID, COMMENTS_ID, [Query.equal('videoId', videoId)]);
    const el = document.getElementById(`comment-count-${videoId}`);
    if (el) el.textContent = res.total;
  } catch(e) {}
}

function openAuth() {
  if (currentUser) {
    if (confirm(`Signed in as ${currentUser.email}\n\nSign out?`)) {
      account.deleteSession('current').then(()=>{ currentUser=null; alert('Signed out'); });
    }
    return;
  }
  document.getElementById('authModal').classList.add('show');
}
function closeAuth() { document.getElementById('authModal').classList.remove('show'); }

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    await account.create(ID.unique(), email, password);
    await account.createEmailPasswordSession(email, password);
    currentUser = await account.get();
    closeAuth();
    alert('Account created!');
  } catch(e) { alert(e.message); }
}

async function signIn() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    await account.createEmailPasswordSession(email, password);
    currentUser = await account.get();
    closeAuth();
    alert('Signed in!');
  } catch(e) { alert(e.message); }
}

function checkAuthUpload() {
  if (!currentUser) { openAuth(); return; }
  document.getElementById('fileInput').click();
}

async function uploadVideo(file) {
  if (!file ||!currentUser) return;
  const btn = document.querySelector('.upload-btn');
  btn.innerHTML = '...'; btn.disabled = true;
  try {
    const uploaded = await storage.createFile(BUCKET_ID, ID.unique(), file);
    const fileUrl = storage.getFileView(BUCKET_ID, uploaded.$id).toString();
    await databases.createDocument(DATABASE_ID, COLLECTION_ID, ID.unique(), {
      title: file.name.replace(/\.[^/.]+$/, ""),
      url: fileUrl,
      channel: currentUser.email.split('@')[0],
      userId: currentUser.$id,
      likes: 0,
      dislikes: 0
    });
    btn.innerHTML = '+'; btn.disabled = false;
    loadVideos();
    alert('Upload successful!');
  } catch(e) {
    alert('Upload failed: ' + e.message);
    btn.innerHTML = '+'; btn.disabled = false;
  }
}

async function likeVideo(videoId) {
  const key = `liked_${videoId}`;
  const disKey = `disliked_${videoId}`;
  if (localStorage.getItem(key)) return;
  try {
    const doc = await databases.getDocument(DATABASE_ID, COLLECTION_ID, videoId);
    const updates = { likes: (doc.likes||0)+1 };
    if (localStorage.getItem(disKey)) {
      updates.dislikes = Math.max(0, (doc.dislikes||0)-1);
      localStorage.removeItem(disKey);
    }
    await databases.updateDocument(DATABASE_ID, COLLECTION_ID, videoId, updates);
    localStorage.setItem(key, '1');
    loadVideos();
  } catch(e) {}
}

async function dislikeVideo(videoId) {
  const key = `disliked_${videoId}`;
  const likeKey = `liked_${videoId}`;
  if (localStorage.getItem(key)) return;
  try {
    const doc = await databases.getDocument(DATABASE_ID, COLLECTION_ID, videoId);
    const updates = { dislikes: (doc.dislikes||0)+1 };
    if (localStorage.getItem(likeKey)) {
      updates.likes = Math.max(0, (doc.likes||0)-1);
      localStorage.removeItem(likeKey);
    }
    await databases.updateDocument(DATABASE_ID, COLLECTION_ID, videoId, updates);
    localStorage.setItem(key, '1');
    loadVideos();
  } catch(e) {}
}

async function openComments(videoId) {
  currentVideoId = videoId;
  document.getElementById('commentsSheet').classList.add('show');
  loadComments();
}

function closeComments() {
  document.getElementById('commentsSheet').classList.remove('show');
}

async function loadComments() {
  if (!currentVideoId) return;
  try {
    const res = await databases.listDocuments(DATABASE_ID, COMMENTS_ID, [
      Query.equal('videoId', currentVideoId),
      Query.orderDesc('$createdAt')
    ]);
    document.getElementById('commentsHeader').textContent = `Comments (${res.total})`;
    const list = document.getElementById('commentsList');
    list.innerHTML = res.documents.map(c => `
      <div class="comment">
        <div class="comment-user">@${c.user || 'anon'}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    `).join('') || '<div style="padding:20px;opacity:0.6;text-align:center;">No comments yet</div>';
  } catch(e) { console.log(e.message); }
}

async function postComment() {
  if (!currentUser) { openAuth(); return; }
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text ||!currentVideoId) return;
  try {
    await databases.createDocument(DATABASE_ID, COMMENTS_ID, ID.unique(), {
      videoId: currentVideoId,
      text: text,
      user: currentUser.email.split('@')[0],
      createdAt: new Date().toISOString()
    });
    input.value = '';
    loadComments();
    loadCommentCount(currentVideoId);
  } catch(e) { alert(e.message); }
}
</script>
</body>
</html>
